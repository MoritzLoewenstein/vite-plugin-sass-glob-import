name: CI

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: 'npm'

      - uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - run: npm ci

      - run: npm run biome:ci

      - run: npm run typecheck

      - run: npm run test

  publish:
    if: github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - run: npm ci

      - run: npm run build

      - run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --tag latest --provenance || echo "Already published version $(node -p "require('./package.json').version")"
